    eval_batch_size: 32
    num_workers: 0
    accelerator: gpu
    devices: 1
    precision: bf16-mixed
    max_epochs: 3
    lr: 0.0002
    weight_decay: 0.0001
    grad_clip_norm: 1.0
    log_every_n_steps: 10
