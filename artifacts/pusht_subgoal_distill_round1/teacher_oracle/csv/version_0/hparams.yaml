cfg:
  experiment_name: pusht_subgoal_distill_round1
  seed: 7
  output_root: ./vw2_directact_outputs
  logging:
    use_wandb: false
    project: vw2_directact
    entity: null
  data:
    dataset_type: pusht
    path: null
    dataset_name: pusht_expert_train
    cache_dir: C:/Users/yiche/.stable-wm
    image_size: 96
