    teacher_ratio_start: 0.8
    teacher_ratio_end: 0.2
    teacher_ratio_steps: 1000
    execute_steps: 1
    temperature: 1.0
  conditioning:
    mode: mixed
  ablation:
    mode: full
  eval:
    offline_batches: 10
    run_world: true
    num_rollouts: 50
    goal_offset_steps: 25
    max_steps: 100
    rollout_batch_size: 50
    save_video: true
    save_video_count: 10
    execute_actions_per_plan_sweep:
